name: Build and Push Docker Images (v2)

on:
  push:
    branches: ["2.0.0"]
    tags: ["v2*"]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/makzinapps-docker

jobs:
  build-binaries:
    strategy:
      matrix:
        include:
          - arch: x86_64
            platform: linux/amd64
            runner: ubuntu-latest
          - arch: aarch64
            platform: linux/arm64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: "2.0.0"

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v3

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: bin/binaries.Dockerfile
          platforms: ${{ matrix.platform }}
          push: true
          tags: ${{ env.IMAGE_PREFIX }}/komodo-binaries:2-dev-${{ matrix.arch }}
          provenance: false
          cache-from: type=gha,scope=v2-binaries-${{ matrix.arch }}
          cache-to: type=gha,mode=max,scope=v2-binaries-${{ matrix.arch }}

  build-ui:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: "2.0.0"

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v3

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: ui/Dockerfile
          push: true
          tags: ${{ env.IMAGE_PREFIX }}/komodo-ui:2-dev
          provenance: false
          cache-from: type=gha,scope=v2-ui
          cache-to: type=gha,mode=max,scope=v2-ui

  build-core:
    needs: [build-binaries, build-ui]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: "2.0.0"

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v3
      - uses: docker/setup-qemu-action@v3

      - name: Generate tags
        id: tags
        run: |
          TAGS="${{ env.IMAGE_PREFIX }}/komodo-core:2-dev"
          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            VERSION="${{ github.ref_name }}"
            VERSION="${VERSION#v}"
            TAGS="${TAGS},${{ env.IMAGE_PREFIX }}/komodo-core:${VERSION}"
          fi
          echo "tags=${TAGS}" >> "$GITHUB_OUTPUT"

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: bin/core/multi-arch.Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.tags.outputs.tags }}
          build-args: |
            BINARIES_IMAGE=${{ env.IMAGE_PREFIX }}/komodo-binaries:2-dev
            UI_IMAGE=${{ env.IMAGE_PREFIX }}/komodo-ui:2-dev

  build-periphery:
    needs: [build-binaries]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: "2.0.0"

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v3
      - uses: docker/setup-qemu-action@v3

      - name: Generate tags
        id: tags
        run: |
          TAGS="${{ env.IMAGE_PREFIX }}/komodo-periphery:2-dev"
          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            VERSION="${{ github.ref_name }}"
            VERSION="${VERSION#v}"
            TAGS="${TAGS},${{ env.IMAGE_PREFIX }}/komodo-periphery:${VERSION}"
          fi
          echo "tags=${TAGS}" >> "$GITHUB_OUTPUT"

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: bin/periphery/multi-arch.Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.tags.outputs.tags }}
          build-args: |
            BINARIES_IMAGE=${{ env.IMAGE_PREFIX }}/komodo-binaries:2-dev
