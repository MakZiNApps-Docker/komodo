name: Build and Push Docker Images

on:
  push:
    branches: [main]
    tags: ["v1*"]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/makzinapps-docker

jobs:
  build-binaries:
    strategy:
      matrix:
        include:
          - arch: x86_64
            platform: linux/amd64
            runner: ubuntu-latest
          - arch: aarch64
            platform: linux/arm64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set version from tag
        if: github.ref_type == 'tag'
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          sed -i "s/^version = \".*\"/version = \"${VERSION}\"/" Cargo.toml
          sed -i "s/\"version\": \".*\"/\"version\": \"${VERSION}\"/" client/core/ts/package.json

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v3

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: bin/chef.binaries.Dockerfile
          platforms: ${{ matrix.platform }}
          push: true
          tags: ${{ env.IMAGE_PREFIX }}/komodo-binaries:latest-${{ matrix.arch }}
          provenance: false
          cache-from: type=gha,scope=binaries-${{ matrix.arch }}
          cache-to: type=gha,mode=max,scope=binaries-${{ matrix.arch }}

  build-frontend:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v3

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: frontend/Dockerfile
          push: true
          tags: ${{ env.IMAGE_PREFIX }}/komodo-frontend:latest
          provenance: false
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,mode=max,scope=frontend

  build-core:
    needs: [build-binaries, build-frontend]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v3
      - uses: docker/setup-qemu-action@v3

      - name: Generate tags
        id: tags
        run: |
          TAGS="${{ env.IMAGE_PREFIX }}/komodo-core:latest"
          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            VERSION="${{ github.ref_name }}"
            VERSION="${VERSION#v}"
            TAGS="${TAGS},${{ env.IMAGE_PREFIX }}/komodo-core:${VERSION}"
          fi
          echo "tags=${TAGS}" >> "$GITHUB_OUTPUT"

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: bin/core/multi-arch.Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.tags.outputs.tags }}
          build-args: |
            BINARIES_IMAGE=${{ env.IMAGE_PREFIX }}/komodo-binaries:latest
            FRONTEND_IMAGE=${{ env.IMAGE_PREFIX }}/komodo-frontend:latest

  build-periphery:
    needs: [build-binaries]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v3
      - uses: docker/setup-qemu-action@v3

      - name: Generate tags
        id: tags
        run: |
          TAGS="${{ env.IMAGE_PREFIX }}/komodo-periphery:latest"
          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            VERSION="${{ github.ref_name }}"
            VERSION="${VERSION#v}"
            TAGS="${TAGS},${{ env.IMAGE_PREFIX }}/komodo-periphery:${VERSION}"
          fi
          echo "tags=${TAGS}" >> "$GITHUB_OUTPUT"

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: bin/periphery/multi-arch.Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.tags.outputs.tags }}
          build-args: |
            BINARIES_IMAGE=${{ env.IMAGE_PREFIX }}/komodo-binaries:latest

  release:
    if: github.ref_type == 'tag'
    needs: [build-core, build-periphery]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          gh release create "$GITHUB_REF_NAME" \
            --title "Komodo ${VERSION}" \
            --generate-notes \
            --notes "Core image: \`${{ env.IMAGE_PREFIX }}/komodo-core:${VERSION}\`
          Periphery image: \`${{ env.IMAGE_PREFIX }}/komodo-periphery:${VERSION}\`"
